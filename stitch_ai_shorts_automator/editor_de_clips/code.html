<style>

<style>

<body class="bg-background text-on-background min-h-screen flex flex-col md:flex-row overflow-hidden pb-20 md:pb-0">
<!-- TopAppBar (Web & Mobile) - Modifying intent since this is an editor, not top-level dest -->
<header class="fixed top-0 w-full bg-surface/80 backdrop-blur-xl border-b border-white/15 shadow-[0_0_20px_rgba(208,188,255,0.1)] flex justify-between items-center px-margin-mobile h-16 z-50">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary">Editor</h1>
</div>
<button class="bg-gradient-to-r from-primary-container to-inverse-primary text-white font-label-md text-label-md px-md py-xs rounded-full hover:opacity-90 active:scale-95 transition-all shadow-[0_0_15px_rgba(160,120,255,0.4)]">
            Next
        </button>
</header>
<!-- SideNav (Desktop) - Suppressed because this is an editor screen -->
<main class="flex-1 flex flex-col pt-16 h-screen relative">
<!-- Video Preview Canvas -->
<div class="flex-1 relative flex items-center justify-center bg-surface-container-lowest overflow-hidden">
<!-- Background Blur Layer for Video -->
<div class="absolute inset-0 bg-cover bg-center blur-2xl opacity-30" data-alt="Abstract neon digital background with deep purples and electric blues. Blurred and out of focus, creating a sleek, high-tech atmospheric backdrop for a video editing interface. Soft glowing lights emulate artificial intelligence processing nodes. High contrast aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCCDjUCAqBKcGLMHdVOFGWtgqomWHZjoz73yaPbgwOMzKbPvTMjQOi3JgLimG6q40405PM7DzAEjA4UQqZh3fvEYMkDD4td9ffO9HzLxw9XMiCHCqAOiCL-RH0JWV06U5PT0m_1WDeItdxh3a2oPEV7tBW0TAfZzB1f-NIyKvE0pd2DTKq4FZcqR5TTbZiGlxNc4SZS6pG9uoaFXmgjjhkR1PUyyYCujc3Sh_UGyamw6ltjlIm54RQoRI5Zc287wFkLeIoAtBkAhK0');"></div>

<img alt="Video Preview" class="w-full h-full object-cover" data-alt="A vertical video frame showing a high-tech circuit board or abstract digital data visualization. Vibrant electric cyan and purple lines pulse against a deep black background. The scene feels energetic, futuristic, and precise, perfectly suited for an AI short-form video creator. Cinematic lighting enhances the neon glow." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIm2xlFm-PlXa7zoKeAt3LNymukVc1ciPh6mNQGc5zUlNFbk7CFSuhmg7Wj1d9EQimH1WrBdReHsdyaLyHmtk7bnEeY3s5BQtUwMrcp7JxdU9wm9cz7TExCFbp0qBVdG9MxI-_TBeKZAL90KZegPoFaRJ0sCryDpDHP-yir-LfNmVBIUBBTfpFJaJzpvxfNpVvOmnrkMPYGOvXq7hBN8NehA3k5tf2jxUH5TyJR1hELTTo5HMiDmI10lgSferi9juXOtFjgwYaiMk"/>

<div class="absolute bottom-lg left-0 w-full px-md flex flex-col gap-xs">
<!-- Captions Overlay -->
<div class="bg-surface/60 backdrop-blur-md rounded-lg p-xs text-center border border-white/10 mx-auto w-11/12 shadow-[0_0_15px_rgba(47,217,244,0.2)]">
<p class="font-headline-md text-headline-md-mobile text-white uppercase tracking-wider shadow-sm">AI Video Gen</p>
</div>
</div>
<!-- Play/Pause Control -->
<div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity bg-black/20">
<button class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-full p-sm shadow-[0_0_20px_rgba(208,188,255,0.3)] text-primary">
<span class="material-symbols-outlined text-[48px]" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</div>
<!-- Floating Quick Action Chips (Right side of video on desktop, below on mobile) -->
<div class="absolute right-margin-mobile top-1/2 -translate-y-1/2 flex flex-col gap-sm hidden md:flex z-20">
<button class="flex items-center justify-center w-12 h-12 bg-surface-container-high/90 backdrop-blur-xl border border-white/10 rounded-full text-primary hover:bg-white/10 hover:text-tertiary-fixed-dim transition-all shadow-lg group relative">
<span class="material-symbols-outlined" data-icon="magic_button">magic_button</span>
<span class="absolute right-full mr-xs bg-surface-container-highest px-sm py-1 rounded-md font-label-sm text-label-sm whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity border border-white/5">Re-gen Script</span>
</button>
<button class="flex items-center justify-center w-12 h-12 bg-surface-container-high/90 backdrop-blur-xl border border-white/10 rounded-full text-primary hover:bg-white/10 hover:text-tertiary-fixed-dim transition-all shadow-lg group relative">
<span class="material-symbols-outlined" data-icon="imagesmode">imagesmode</span>
<span class="absolute right-full mr-xs bg-surface-container-highest px-sm py-1 rounded-md font-label-sm text-label-sm whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity border border-white/5">Swap Visuals</span>
</button>
<button class="flex items-center justify-center w-12 h-12 bg-surface-container-high/90 backdrop-blur-xl border border-white/10 rounded-full text-primary hover:bg-white/10 hover:text-tertiary-fixed-dim transition-all shadow-lg group relative">
<span class="material-symbols-outlined" data-icon="record_voice_over">record_voice_over</span>
<span class="absolute right-full mr-xs bg-surface-container-highest px-sm py-1 rounded-md font-label-sm text-label-sm whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity border border-white/5">AI Voice</span>
</button>
</div>
</div>

<div class="flex md:hidden gap-sm px-margin-mobile py-sm overflow-x-auto no-scrollbar border-b border-white/5">
<button class="flex items-center gap-xs bg-surface-variant border border-white/10 rounded-full px-sm py-1.5 text-on-surface-variant hover:text-primary transition-colors whitespace-nowrap font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="magic_button">magic_button</span>
                    Re-gen Script
                </button>
<button class="flex items-center gap-xs bg-surface-variant border border-white/10 rounded-full px-sm py-1.5 text-on-surface-variant hover:text-primary transition-colors whitespace-nowrap font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="imagesmode">imagesmode</span>
                    Swap Visuals
                </button>
<button class="flex items-center gap-xs bg-surface-variant border border-white/10 rounded-full px-sm py-1.5 text-on-surface-variant hover:text-primary transition-colors whitespace-nowrap font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="record_voice_over">record_voice_over</span>

                </button>
</div>

<span>00:12</span>
<div class="flex-1 h-1 bg-surface-container-lowest rounded-full relative cursor-pointer group">
<div class="absolute left-0 top-0 h-full w-1/3 bg-tertiary-fixed-dim rounded-full shadow-[0_0_10px_rgba(47,217,244,0.5)]"></div>

<div class="absolute left-1/3 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-lg border-2 border-tertiary-fixed-dim scale-0 group-hover:scale-100 transition-transform"></div>
</div>
<span>00:60</span>
</div>

<div class="flex-1 overflow-y-auto px-margin-mobile py-md flex flex-col gap-sm">
<!-- Track: Video -->
<div class="flex gap-sm items-center">
<div class="w-8 flex justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="movie">movie</span>
</div>
<div class="flex-1 h-12 bg-surface-container rounded-lg border border-white/5 flex p-1 gap-1 relative overflow-hidden">

</div>
</div>
</div>

<div class="flex gap-sm items-center">
<div class="w-8 flex justify-center text-tertiary-fixed-dim shadow-[0_0_10px_rgba(47,217,244,0.2)] rounded-full p-1 bg-tertiary-container/10">
<span class="material-symbols-outlined text-[18px]" data-icon="subtitles">subtitles</span>
</div>
<div class="flex-1 h-8 bg-surface-container rounded-lg border border-white/5 flex p-1 gap-1 relative overflow-hidden">
<div class="w-1/3 h-full bg-tertiary-container/30 border border-tertiary-fixed-dim/40 rounded-sm flex items-center px-2">
<span class="text-[10px] text-tertiary-fixed-dim font-label-sm truncate">Welcome to the future...</span>
</div>
<div class="w-1/3 h-full ml-auto bg-tertiary-container/30 border border-tertiary-fixed-dim/40 rounded-sm flex items-center px-2">
<span class="text-[10px] text-tertiary-fixed-dim font-label-sm truncate">Subscribe now!</span>
</div>
</div>
</div>

<div class="flex gap-sm items-center">
<div class="w-8 flex justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="audio_file">audio_file</span>
</div>
<div class="flex-1 h-8 bg-surface-container rounded-lg border border-white/5 flex p-1 gap-1 relative overflow-hidden">

<div class="w-full h-full bg-secondary-container/20 border border-secondary/30 rounded-sm flex items-center justify-center gap-[2px] px-2 overflow-hidden">
<div class="h-1/2 w-1 bg-secondary/50 rounded-full"></div>

<div class="h-1/3 w-1 bg-secondary/50 rounded-full"></div>
<div class="h-1/2 w-1 bg-secondary/50 rounded-full"></div>
<div class="h-full w-1 bg-secondary/80 rounded-full"></div>
<div class="h-3/4 w-1 bg-secondary/50 rounded-full"></div>
<div class="h-1/4 w-1 bg-secondary/50 rounded-full"></div>
<div class="h-1/2 w-1 bg-secondary/50 rounded-full"></div>
</div>
</div>
</div>
</div>
</div>
</main>
